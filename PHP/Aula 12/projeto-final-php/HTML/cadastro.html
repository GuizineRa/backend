<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam - Cadastro</title>

    <link rel="stylesheet" href="../CSS/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <header>

    <div class="header-logo">
        <img src="../IMG/Design sem nome.svg"
             alt="Steam Logo"
             class="logo">
    </div>

    <div class="header-title">
        <h1>CADASTRAR</h1>
    </div>

</header>

  <main>

    <section class="cadastro-container">

        <div class="cadastro-box">

            <h2>Cadastre-se</h2>

            <form class="cadastro-form">

                <input
                    type="text"
                    name="nome"
                    placeholder="Nome de usuário..."
                    required
                >

                <input
                    type="email"
                    name="email"
                    placeholder="E-mail..."
                    required
                >

                <input
                    type="password"
                    name="senha"
                    placeholder="Criar senha..."
                    required
                >

                <input
                    type="password"
                    name="confirmar_senha"
                    placeholder="Confirmar senha..."
                    required
                >

                <button type="submit">
                    Criar conta
                </button>

            </form>

        </div>

    </section>

</main>

    <footer>

        <img src="../IMG/Design sem nome.svg" alt="Steam Logo" class="footer-logo">



    </footer>

</body>

</html>
